<svg xmlns="http://www.w3.org/http/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Emerald Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Inner Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />

  <!-- Outer Decorative Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.4" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2" />

  <!-- Shield Shape (Emerald) -->
  <g filter="url(#glow)">
    <path d="M 256,90 
             C 340,90 395,120 405,210 
             C 415,310 340,380 256,430 
             C 172,380 97,310 107,210 
             C 117,120 172,90 256,90 Z" 
          fill="url(#shieldGrad)" 
          stroke="url(#goldGrad)" 
          stroke-width="5" 
          stroke-linejoin="round" />
  </g>

  <!-- Inner Shield Highlight Shadow -->
  <path d="M 256,105 
           C 325,105 375,130 385,205 
           C 393,285 330,345 256,395 
           C 182,345 119,285 127,205 
           C 137,130 187,105 256,105 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        opacity="0.15" />

  <!-- Stylized African Susu Basket Weave & Growth Pattern (Gold lines inside shield) -->
  <g stroke="url(#goldGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9">
    <!-- Center Vault Core Vertical Pillar -->
    <line x1="256" y1="130" x2="256" y2="380" stroke-width="4" />
    
    <!-- Upward Chevrons (Representing Growth and Locks) -->
    <path d="M 180,220 L 256,170 L 332,220" />
    <path d="M 160,270 L 256,210 L 352,270" />
    <path d="M 170,320 L 256,250 L 342,320" />
    <path d="M 190,360 L 256,290 L 322,360" />

    <!-- Circular Lock Dial Background -->
    <circle cx="256" cy="230" r="45" fill="#020617" stroke="url(#goldGrad)" stroke-width="4.5" />
    
    <!-- Vault Keyhole/Dial Lines -->
    <circle cx="256" cy="230" r="22" fill="none" stroke="#10b981" stroke-width="2.5" />
    <line x1="256" y1="230" x2="256" y2="215" stroke-width="3.5" stroke-linecap="square" />
    <path d="M 253,230 L 259,230 L 261,244 L 251,244 Z" fill="url(#goldGrad)" stroke="none" />
  </g>

  <!-- Small Locking Bolt Indicators -->
  <circle cx="211" cy="230" r="3.5" fill="#fbbf24" />
  <circle cx="301" cy="230" r="3.5" fill="#fbbf24" />
  <circle cx="256" cy="185" r="3.5" fill="#fbbf24" />
  <circle cx="256" cy="275" r="3.5" fill="#fbbf24" />
  
  <!-- Subtle Sparkles of Growth -->
  <g fill="#fbbf24" opacity="0.8">
    <!-- Left Sparkle -->
    <path d="M 140,150 Q 150,150 150,140 Q 150,150 160,150 Q 150,150 150,160 Q 150,150 140,150" />
    <!-- Right Sparkle -->
    <path d="M 352,150 Q 362,150 362,140 Q 362,150 372,150 Q 362,150 362,160 Q 362,150 352,150" />
  </g>
</svg>
